name: sync_db
description: A syncronising database that automatically gets and saves data to a server.

environment:
  sdk: ">=3.0.0 <4.0.0"

isar_version: &isar_version 3.3.2
dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  jaguar_jwt: ^3.0.0
  shared_preferences: ^2.5.5
  synchronized: ^3.4.1
  universal_io: ^2.3.1
  graphql_flutter: ^5.3.0
  ntp: ^2.0.0
  universal_platform: ^1.1.0
  amazon_cognito_identity_dart_2: ^4.0.0
  source_gen: ^4.2.3
  pool: ^1.5.2
  random_string: ^2.3.1
  queue: ^3.4.0
  mime_type: ^1.0.1
  singleton: ^0.0.3-nullsafety
  tuple: ^2.0.2
  recase: ^4.1.0
  isar_community: *isar_version
  isar_community_flutter_libs: *isar_version
  sembast: ^3.8.8
  sembast_web: ^2.4.5

  robust_http:
    git:
      url: https://github.com/bookbot-kids/robust_http.git

dependency_overrides:  
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_lints:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  equatable: ^2.0.8
  isar_community_generator: *isar_version
